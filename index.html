<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Operations Roster 2026</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

  <style>
    :root { --brand-lilac:#9273DA; --brand-dark:#2E1A47; --brand-lime:#D2F050; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; color: #1b2940; margin: 0; padding: 0; }
    
    /* ── NEW HERO BANNER ── */
    .hero-banner {
      background: linear-gradient(135deg, var(--brand-dark) 0%, #4a2b75 50%, var(--brand-lilac) 100%);
      padding: 120px 20px 80px 20px;
      text-align: center;
      color: white;
      position: relative;
    }
    /* Pulls the white content cards up over the banner slightly */
    .overlap-content { margin-top: -40px; position: relative; z-index: 10; }

    /* ── TRANSPARENT-TO-SOLID NAVBAR ── */
    .acwa-navbar { 
      background-color: transparent !important; 
      padding: 20px 0; 
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
      transition: padding 0.4s ease, background-color 0.4s ease, box-shadow 0.4s ease, backdrop-filter 0.4s ease; 
    }
    .acwa-navbar.scrolled { 
      padding: 8px 0; 
      background-color: rgba(46, 26, 71, 0.95) !important; 
      backdrop-filter: blur(12px); 
      box-shadow: 0 4px 30px rgba(0,0,0,0.3); 
    }
    .navbar-brand svg { height: 46px; width: auto; transition: height 0.4s ease; }
    .acwa-navbar.scrolled .navbar-brand svg { height: 36px; }
    
    @media (min-width: 992px) {
      .navbar-expand-lg .navbar-collapse { display: flex !important; visibility: visible !important; flex-basis: auto; }
      .navbar-toggler { display: none !important; }
    }
    
    /* ── CARDS & BADGES ── */
    .sap-card { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; overflow: hidden; display: flex; flex-direction: column;}
    .sap-card-top { height: 5px; width: 100%; flex-shrink: 0;}
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 999px; }
    .badge-sap      { background-color: #ede9fe; color: #6d28d9; border: 1px solid #c4b5fd; }
    .badge-planned  { background-color: #e0f2fe; color: #0288d1; border: 1px dashed #0288d1; }
    .badge-conflict { background-color: #fee2e2; color: #b91c1c; }
    
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

    dialog::backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(3px); }
    
    .crew-red         { color: #d32f2f; font-weight: 800; }
    .crew-yellow      { color: #f9a825; font-weight: 800; }
    .crew-green       { color: #2e7d32; font-weight: 800; }
    .crew-lightblue   { color: #0288d1; font-weight: 800; }
    .crew-lightviolet { color: #7b1fa2; font-weight: 800; }
    .crew-lightorange { color: #ef6c00; font-weight: 800; }
    .crew-grey        { color: #616161; font-weight: 800; }
    
    /* ── TOAST & MAGIC WAND ── */
    #toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(20px); pointer-events: none; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: #2e7d32; }
    #toast.error   { background: #b91c1c; }
    #toast.saving  { background: #0288d1; }
    @keyframes magical-glow { 0% { box-shadow: 0 0 5px #9273DA; } 50% { box-shadow: 0 0 30px #9273DA, 0 0 50px #D2F050; } 100% { box-shadow: 0 0 5px #9273DA; } }
    .magic-resolving { animation: magical-glow 1.5s ease-in-out; }

    /* ── ULTIMATE LOCKED TIMELINE (FROZEN PANES) ── */
    .timeline-container-wrapper { 
        overflow: auto; /* Enables both X and Y scrolling */
        max-height: 65vh; /* Locks the box height so the slicer scrollbar is always visible */
        max-width: 100%; 
        border: 1px solid #e5e7eb; 
        border-radius: 12px; 
        background: white; 
        box-shadow: 0 4px 6px rgba(0,0,0,0.04); 
        position: relative;
    }
    .timeline-grid-interactive { display: inline-grid; grid-template-columns: 200px repeat(365, 28px); gap: 0; }
    
    /* The Magic Sticky Elements */
    .timeline-header-corner { 
        position: sticky; top: 0; left: 0; z-index: 50; /* Highest z-index */
        background: #f8fafc; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; 
        display: flex; align-items: center; padding-left: 1rem; font-weight: 700; color: #4b5563; font-size: 0.85rem; 
    }
    .timeline-header-date { 
        position: sticky; top: 0; z-index: 40; 
        font-size: 0.65rem; text-align: center; color: #6b7280; font-weight: bold; padding: 4px 0; 
        border-bottom: 1px solid #e5e7eb; border-right: 1px solid #f3f4f6; background: #f8fafc; 
    }
    .timeline-name-col { 
        position: sticky; left: 0; z-index: 30; 
        background: white; border-right: 1px solid #e5e7eb; border-bottom: 1px solid #f3f4f6; 
        padding: 4px 12px; cursor: pointer; transition: background 0.2s; 
    }
    .timeline-name-col:hover { background: #f8fafc; }
    
    .timeline-cell { 
        height: 100%; border-right: 1px solid #ffffff; border-bottom: 1px solid #f3f4f6; 
        transition: transform 0.1s, filter 0.1s; position: relative; cursor: crosshair; z-index: 1;
    }
    .timeline-cell:hover { transform: scale(1.4); filter: brightness(0.85); z-index: 20; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .timeline-cell[title]:hover::after { 
        content: attr(title); position: absolute; bottom: 140%; left: 50%; transform: translateX(-50%); 
        background-color: #1f2937; color: white; padding: 5px 8px; border-radius: 6px; font-size: 10px; white-space: nowrap; z-index: 60; pointer-events: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
    }
    
    @media(max-width:991px){
      .navbar-collapse { background:rgba(46,34,53,.98); padding:1rem; border-radius:0 0 12px 12px; position:absolute; top:100%; left:0; right:0; box-shadow:0 10px 25px rgba(0,0,0,.5); z-index:1050; }
      .nav-actions { flex-direction:column; align-items:stretch; margin-left:0; padding-top:10px; border-top:1px solid rgba(255,255,255,.1); }
    }
  </style>
</head>

<dialog id="edit-modal" class="p-0 rounded-2xl shadow-2xl border-0 w-full max-w-md">

  const crewOrder = { 'A': 1, 'B': 2, 'C': 3, 'D': 4, 'General': 5 };
  const roleOrder = { 'Shift in Charge Engineer': 1, 'Shift in Charge': 1, 'Supervisor': 2, 'CCR Operator': 3, 'Local Operator': 4, 'Filed Operator': 5, 'Field Operator': 5 };

    'crew-red':'d32f2f','crew-yellow':'f9a825','crew-green':'2e7d32',
    'crew-lightblue':'0288d1','crew-lightviolet':'7b1fa2',
    'crew-lightorange':'ef6c00','crew-grey':'616161'
  };

  const shiftCycles = {
      'A': ['O', 'O', 'O', 'O', 'D', 'D', 'N', 'N'],
      'B': ['D', 'D', 'N', 'N', 'O', 'O', 'O', 'O'],
      'C': ['N', 'N', 'O', 'O', 'O', 'O', 'D', 'D'],
      'D': ['O', 'O', 'D', 'D', 'N', 'N', 'O', 'O'],
      'General': ['O', 'O', 'O', 'O', 'O', 'O', 'O', 'O']
  };

  function getDaysSinceBase(dateStr) {
      const base = new Date('2026-01-01T00:00:00Z');
      const current = new Date(dateStr + 'T00:00:00Z');
      return Math.floor((current - base) / (1000 * 60 * 60 * 24));
  }

  // ── UI HELPERS ──
  function showToast(msg, type='success', duration=2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    clearTimeout(t._t);
    t._t = setTimeout(() => t.className = '', duration);
  }

  function formatNoYear(d) {
    if (!d) return '';
    const p = d.split('-');
    if (p.length === 3) return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(p[1],10)-1] + ' ' + parseInt(p[2],10);
    return d;
  }

  function getInitials(name) { return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase(); }

  // ── CONFLICTS ──
  function calculateConflicts() {
    roster.forEach(p => { p.conflict = false; p.conflictWith = []; });
    let count = 0;
    for (let i = 0; i < roster.length; i++) {
      for (let j = i+1; j < roster.length; j++) {
        const p1 = roster[i], p2 = roster[j];
        if (p1.crew !== p2.crew || p1.role !== p2.role) continue;
        let hit = false;
        p1.leaves.forEach(l1 => p2.leaves.forEach(l2 => {
          if (new Date(l1.start) <= new Date(l2.end) && new Date(l2.start) <= new Date(l1.end)) hit = true;
        }));
        if (hit) {
          p1.conflict = p2.conflict = true;
          if (!p1.conflictWith.includes(p2.name)) p1.conflictWith.push(p2.name);
          if (!p2.conflictWith.includes(p1.name)) p2.conflictWith.push(p1.name);
        }
      }
    }
    roster.forEach(p => { if (p.conflict) count++; });
    document.getElementById('conflict-banner').innerHTML = count > 0
      ? `<span class="text-red-600 font-bold">${count} schedule conflicts detected.</span>`
      : `<span class="text-green-600 font-bold">No conflicts detected. All systems green.</span>`;
  }

  function unlockAutoScheduler() {
      document.querySelectorAll('.suggest-btn').forEach(b => b.style.display = 'inline-block');
      showToast('Admin Mode: Auto-Scheduler Unlocked!', 'success');
      document.getElementById('header-container').classList.add('magic-resolving');
      setTimeout(()=> document.getElementById('header-container').classList.remove('magic-resolving'), 1500);
  }

  function suggestLeave(personId) {
    const target = roster.find(x => x.id === personId);
    if (!target) return;
    const peers = roster.filter(x => x.id !== personId && x.crew === target.crew && x.role === target.role);
    let badDates = new Set();
    peers.forEach(peer => peer.leaves.forEach(lv => {
        let s = new Date(lv.start).getTime(), e = new Date(lv.end).getTime();
        for (let d = s; d <= e; d += 86400000) badDates.add(d);
    }));
    let startSearch = new Date('2026-04-01').getTime(), endSearch = new Date('2026-12-15').getTime(), bestStart = null;
    for (let d = startSearch; d <= endSearch; d += 86400000) {
      let hasConflict = false;
      for (let i = 0; i < 14; i++) {
        if (badDates.has(d + (i * 86400000))) { hasConflict = true; break; }
      }
      if (!hasConflict) { bestStart = d; break; }
    }
    if (bestStart) {
      handleEditPerson(personId);
      setTimeout(() => {
        document.getElementById('edit-start').value = new Date(bestStart).toISOString().split('T')[0];
        document.getElementById('edit-end').value   = new Date(bestStart + (13 * 86400000)).toISOString().split('T')[0];
        checkModalConflicts();
        showToast('Found optimal 14-day window!', 'success');
      }, 50);
    } else {
      alert(`No clear 14-day window found for Crew ${target.crew} ${target.role}s in 2026.`);
    }
  }

  // ULTIMATE FROZEN TIMELINE 
  function renderTimeline() {
    const container = document.getElementById('timeline-container');
    let html = `<div class="timeline-grid-interactive"><div class="timeline-header-corner">EMPLOYEE</div>`; 
    
    let startDate = new Date("2026-01-01T00:00:00Z");
    const dates = [];

    // Header Row (365 days)
    for(let i=0; i<365; i++) {
        let d = new Date(startDate);
        d.setUTCDate(d.getUTCDate() + i);
        dates.push(d);
        html += `<div class="timeline-header-date">${d.getUTCDate()}<br><span class="font-normal opacity-70">${d.toLocaleDateString('en-US', {weekday:'narrow', timeZone:'UTC'})}</span></div>`;
    }

    const uiSortedRoster = [...roster].sort((a, b) => {
        if (a.crew !== b.crew) return (crewOrder[a.crew] || 99) - (crewOrder[b.crew] || 99);
        return (roleOrder[a.role] || 99) - (roleOrder[b.role] || 99);
    });

    uiSortedRoster.forEach(person => {
        const hex = crewColorMap[person.color] || '000';
        
        const nameHover = person.conflict ? `title="⚠️ CONFLICT WITH: ${person.conflictWith.join(', ')}"` : `title="${person.name}"`;
        
        html += `<div class="timeline-name-col" onclick="handleEditPerson(${person.id})" ${nameHover}>
            <div class="text-[11px] font-extrabold truncate" style="color:#${hex};">${person.conflict ? '⚠️' : ''} ${person.name}</div>
            <div class="text-[9px] font-bold text-gray-400">Crew ${person.crew}</div>
        </div>`;
        
        const cycle = shiftCycles[person.crew] || shiftCycles['General'];

        // Cells Row
        dates.forEach(date => {
            const dateStr = date.toISOString().slice(0, 10);
            const diffInDays = getDaysSinceBase(dateStr);
            const shift = cycle[((diffInDays % 8) + 8) % 8];

            let cellColor = shift === 'D' ? '#FFF2CC' : (shift === 'N' ? '#DDEBF7' : '#F3F4F6');
            let hoverText = `Shift: ${shift}`;
            let extraClass = '';

            person.leaves.forEach(lv => {
                if (dateStr >= lv.start && dateStr <= lv.end) {
                    cellColor = lv.type === 'Applied on SAP' ? '#C4B5FD' : '#FFFF00'; // Light Violet
                    hoverText = `Leave: ${lv.type}`;
                    
                    if (person.conflict) {
                        extraClass = 'ring-2 ring-red-600 animate-pulse'; 
                        hoverText = `⚠️ CONFLICT WITH: ${person.conflictWith.join(', ')} | ${lv.type}`;
                        cellColor = '#EF4444'; // Bright Red
                    }
                }
            });

            // TEXT REMOVED FROM INSIDE CELL
            html += `<div class="timeline-cell ${extraClass}" style="background-color: ${cellColor};" title="${dateStr} | ${hoverText}"></div>`;
        });
    });

    html += `</div>`;
    container.innerHTML = html;
  }

  // ── MODAL ──
  function checkModalConflicts() {
    const start = document.getElementById('edit-start').value;
    const end   = document.getElementById('edit-end').value;
    const idVal = document.getElementById('edit-id').value;
    const warn  = document.getElementById('edit-conflict-warning');
    
    // We fetch the crew/role straight from the person, not the disabled inputs
    const person = roster.find(x => String(x.id) === String(idVal));
    if (!start||!end||!person) { warn.textContent=''; return; }
    
    const sN = new Date(start), eN = new Date(end);
    const hits = [];
    roster.forEach(p => {
      if (idVal && String(p.id)===String(idVal)) return;
      if (p.crew===person.crew && p.role===person.role)
        p.leaves.forEach(l => { if (sN<=new Date(l.end) && new Date(l.start)<=eN) hits.push(p.name); });
    });
    warn.innerHTML = hits.length ? '⚠️ <b>WARNING:</b> Dates conflict with ' + [...new Set(hits)].join(', ') : '';
  }

  function handleEditPerson(id) {
      const p = roster.find(x => x.id === id);
      if (!p) return;
      
      document.getElementById('edit-id').value    = p.id;
      document.getElementById('edit-name').value  = p.name;
      document.getElementById('edit-empid').value = p.empId || 'N/A';
      document.getElementById('edit-role').value  = p.role + ' (Crew ' + p.crew + ')';
      
      document.getElementById('edit-start').value = '';
      document.getElementById('edit-end').value   = '';
      document.getElementById('edit-conflict-warning').textContent = '';
      
      document.getElementById('existing-leaves-list').innerHTML = p.leaves.map((l,i) => `
        <div class="flex justify-between items-center bg-white p-2.5 rounded-md border border-gray-200 text-[11px] font-bold shadow-sm">
          <span>${formatNoYear(l.start)} &rarr; ${formatNoYear(l.end)} <span class="text-gray-400 ml-1 font-normal">(${l.type})</span></span>
          <button onclick="removeLeave(${p.id},${i})" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition">Remove</button>
        </div>`).join('');
        
      document.getElementById('edit-modal').showModal();
  }

  function removeLeave(personId, idx) {
    const p = roster.find(x => x.id===personId);
    if (p && confirm('Delete this leave period?')) {
      p.leaves.splice(idx,1);
      saveData();
      handleEditPerson(personId);
      renderAll();
    }
  }

  function savePerson() {
    const idVal = document.getElementById('edit-id').value;
    const start = document.getElementById('edit-start').value;
    const end   = document.getElementById('edit-end').value;
    
    const newLeave = (start&&end) ? {start, end, type: document.getElementById('edit-type').value} : null;
    
    if (idVal) {
      const i = roster.findIndex(p => String(p.id) === String(idVal));
      if (i !== -1) {
        if (newLeave) {
          roster[i].leaves.push(newLeave);
          roster[i].leaves.sort((a,b) => new Date(a.start)-new Date(b.start));
        }
      }
    }
    
    saveData(); 
    closeModal();
    renderAll();
  }

  function closeModal() { document.getElementById('edit-modal').close(); }

  // ── DYNAMIC EXCEL EXPORTER ─────────
  async function exportToExcel() {
    try {
        showToast('Generating 2026 & 2027 Excel Dashboards...', 'saving', 5000);
        const workbook = new ExcelJS.Workbook();

        const sortedRoster = [...roster].sort((a, b) => {
            if (a.crew !== b.crew) return (crewOrder[a.crew] || 99) - (crewOrder[b.crew] || 99);
            return (roleOrder[a.role] || 99) - (roleOrder[b.role] || 99);
        });

        const borderStyle = { style: 'thin', color: { argb: 'FFD9D9D9' } };
        const gridBorder = { top: borderStyle, left: borderStyle, bottom: borderStyle, right: borderStyle };
        
        const fills = {
            header: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE7E6E6' } },
            weekend: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF2F2F2' } },
            day: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFF2CC' } },
            night: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFDDEBF7' } },
            sap: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFC4B5FD' } }, 
            plan: { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFFF00' } }
        };

        const fonts = {
            day: { bold: true, color: { argb: 'FFD6B656' } },
            night: { bold: true, color: { argb: 'FF6C8EBF' } },
            black: { bold: true, color: { argb: 'FF000000' } }
        };

        const nameColors = {
            'crew-red': 'FFFF0000', 'crew-yellow': 'FFD4AF37', 'crew-green': 'FF00B050',
            'crew-lightblue': 'FF0070C0', 'crew-lightviolet': 'FF7030A0', 'crew-lightorange': 'FFED7D31',
            'crew-grey': 'FF808080'
        };

        function buildSheet(year) {
            const ws = workbook.addWorksheet(`${year} Roster`, {
                views: [{ state: 'frozen', xSplit: 4, ySplit: 4 }] 
            });

            ws.columns = [{ width: 14 }, { width: 35 }, { width: 14 }, { width: 25 }];
            
            ws.mergeCells('A1:D1');
            const titleCell = ws.getCell('A1');
            titleCell.value = `${year} OPERATIONS & LEAVE ROSTER`;
            titleCell.font = { size: 14, bold: true };
            titleCell.alignment = { horizontal: 'center', vertical: 'middle' };

            const legend = [
                { range: 'E1:F1', text: ' S = SAP', fill: fills.sap },
                { range: 'H1:I1', text: ' P = Plan', fill: fills.plan },
                { range: 'K1:M1', text: ' D = Day Shift', fill: fills.day },
                { range: 'O1:R1', text: ' N = Night Shift', fill: fills.night }
            ];

            legend.forEach(item => {
                ws.mergeCells(item.range);
                const cell = ws.getCell(item.range.split(':')[0]);
                cell.value = item.text;
                cell.fill = item.fill;
                cell.font = fonts.black;
                cell.border = gridBorder;
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
            });

            const headerTitles = ["Emp ID", "Full Name", "Crew", "Role"];
            headerTitles.forEach((text, i) => {
                ws.mergeCells(3, i + 1, 4, i + 1);
                const cell = ws.getCell(3, i + 1);
                cell.value = text;
                cell.font = fonts.black;
                cell.alignment = { horizontal: 'center', vertical: 'middle' };
                cell.fill = fills.header;
                cell.border = gridBorder;
            });

            const isLeap = (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            const monthDays = [31, isLeap ? 29 : 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            let colIdx = 5;
            const dateToCol = {};

            months.forEach((mName, mIdx) => {
                const daysInMonth = monthDays[mIdx];
                
                ws.mergeCells(2, colIdx, 2, colIdx + daysInMonth - 1);
                const mCell = ws.getCell(2, colIdx);
                mCell.value = mName;
                mCell.font = fonts.black;
                mCell.alignment = { horizontal: 'center', vertical: 'middle' };
                mCell.fill = fills.header;
                mCell.border = gridBorder;

                for (let d = 1; d <= daysInMonth; d++) {
                    const currentCol = colIdx + d - 1;
                    ws.getColumn(currentCol).width = 3.5;

                    const dateStr = `${year}-${String(mIdx+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    dateToCol[dateStr] = currentCol;

                    const dCell = ws.getCell(3, currentCol);
                    dCell.value = d;
                    dCell.alignment = { horizontal: 'center' };
                    dCell.border = gridBorder;

                    const currentDate = new Date(dateStr + 'T00:00:00Z');
                    const dayOfWeek = currentDate.getUTCDay();

                    const dowCell = ws.getCell(4, currentCol);
                    dowCell.value = currentDate.toLocaleDateString('en-US', { weekday: 'short', timeZone: 'UTC' })[0];
                    dowCell.alignment = { horizontal: 'center' };
                    dowCell.font = { size: 8, color: { argb: 'FF595959' } };
                    dowCell.border = gridBorder;

                    if (dayOfWeek === 5 || dayOfWeek === 6) {
                        dCell.fill = fills.weekend;
                        dowCell.fill = fills.weekend;
                    }
                }
                colIdx += daysInMonth;
            });

            let rowNum = 5;
            sortedRoster.forEach(person => {
                const cycle = shiftCycles[person.crew] || shiftCycles['General'];
                
                ws.getCell(rowNum, 1).value = person.empId;
                ws.getCell(rowNum, 1).alignment = { horizontal: 'center', vertical: 'middle' };
                ws.getCell(rowNum, 1).border = gridBorder;

                ws.getCell(rowNum, 2).value = person.name;
                ws.getCell(rowNum, 2).alignment = { vertical: 'middle' };
                ws.getCell(rowNum, 2).border = gridBorder;
                ws.getCell(rowNum, 2).font = { bold: true, color: { argb: nameColors[person.color] || 'FF000000' } };

                ws.getCell(rowNum, 3).value = person.crew === 'General' ? 'General' : `Crew ${person.crew}`;
                ws.getCell(rowNum, 3).alignment = { horizontal: 'center', vertical: 'middle' };
                ws.getCell(rowNum, 3).border = gridBorder;

                ws.getCell(rowNum, 4).value = person.role;
                ws.getCell(rowNum, 4).alignment = { horizontal: 'center', vertical: 'middle' };
                ws.getCell(rowNum, 4).border = gridBorder;

                let dayCount = 0;
                for (let m = 0; m < 12; m++) {
                    for (let d = 1; d <= monthDays[m]; d++) {
                        const dateStr = `${year}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const diffInDays = getDaysSinceBase(dateStr);
                        
                        const shift = cycle[((diffInDays % 8) + 8) % 8]; 
                        const c = 5 + dayCount;
                        const cell = ws.getCell(rowNum, c);

                        const currentDate = new Date(dateStr + 'T00:00:00Z');
                        const isWeekend = currentDate.getUTCDay() === 5 || currentDate.getUTCDay() === 6;

                        cell.alignment = { horizontal: 'center', vertical: 'middle' };
                        cell.border = gridBorder;

                        if (shift === 'D') {
                            cell.value = 'D'; cell.fill = fills.day; cell.font = fonts.day;
                        } else if (shift === 'N') {
                            cell.value = 'N'; cell.fill = fills.night; cell.font = fonts.night;
                        } else if (isWeekend) {
                            cell.fill = fills.weekend;
                        }
                        dayCount++;
                    }
                }

                if (person.leaves) {
                    person.leaves.forEach(lv => {
                        if (lv.start.startsWith(String(year)) || lv.end.startsWith(String(year))) {
                            let cur = new Date(lv.start + 'T12:00:00Z');
                            let end = new Date(lv.end + 'T12:00:00Z');

                            while (cur <= end) {
                                const c = dateToCol[cur.toISOString().slice(0, 10)];
                                if (c) {
                                    const lCell = ws.getCell(rowNum, c);
                                    const isSAP = lv.type === 'Applied on SAP';
                                    lCell.value = isSAP ? 'S' : 'P';
                                    lCell.fill = isSAP ? fills.sap : fills.plan;
                                    lCell.font = fonts.black;
                                }
                                cur.setDate(cur.getDate() + 1);
                            }
                        }
                    });
                }
                rowNum++;
            });
        }

        buildSheet(2026);
        buildSheet(2027);

        const outBuffer = await workbook.xlsx.writeBuffer();
        const blob = new Blob([outBuffer], { type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'Operations-Master-Roster.xlsx';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        showToast('Exported seamlessly!', 'success');
    } catch (error) {
        console.error(error);
        alert("Error: " + error.message);
    }
  }

  // ── INIT APP ON LOAD ───────────────────────
  document.addEventListener('DOMContentLoaded', loadData);

</script>
</body>
